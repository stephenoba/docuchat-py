name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Run linting
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -v
        env:
          SECRET_KEY: "ci_secret"
          REFRESH_SECRET_KEY: "ci_refresh_secret"
          DATABASE_URL: "sqlite+aiosqlite:///ci.sqlite3"
          REDIS_URL: "redis://localhost:6379/0"
          DEBUG: "false"
